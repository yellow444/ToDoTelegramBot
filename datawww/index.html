<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Picker</title>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>
    <h1>Выберите дату:</h1>
    <input type="text" id="datepicker" placeholder="Выберите дату">

    <button onclick="sendDate()">Отправить дату</button>

    <script>
        // Инициализация Flatpickr (датапикера)
        flatpickr("#datepicker", {
            dateFormat: "Y-m-d",
        });

        // Отправка выбранной даты в Telegram Web App
        function sendDate() {
            const selectedDate = document.getElementById("datepicker").value;
            if (window.Telegram.WebApp) {
                Telegram.WebApp.sendData(selectedDate);  // Отправка даты обратно в Telegram
                Telegram.WebApp.close();  // Закрываем Web App после отправки
            }
        }

        // Инициализация Telegram Web App
        Telegram.WebApp.ready();
    </script>
</body>

</html>
