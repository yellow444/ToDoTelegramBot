server {
    listen 80;

    server_name broadband-188-255-24-92.ip.moscow.rt.ru www.broadband-188-255-24-92.ip.moscow.rt.ru;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://broadband-188-255-24-92.ip.moscow.rt.ru$request_uri;
    }
}

server {
    listen 443 default_server ssl;
    http2  on;

    server_name broadband-188-255-24-92.ip.moscow.rt.ru;

    ssl_certificate /etc/nginx/ssl/live/broadband-188-255-24-92.ip.moscow.rt.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/broadband-188-255-24-92.ip.moscow.rt.ru/privkey.pem;
    
    location / {
        proxy_pass "http://todotelegrambot/";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}